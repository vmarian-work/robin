# Docker Compose for Haraka + Dovecot LDA Testing
# Single container with Haraka SMTP and Dovecot LDA subprocess delivery.

services:
  haraka-dovecot-lda:
    build:
      context: ../../
      dockerfile: ./.perf/robin-dovecot-lda/haraka.Dockerfile
    volumes:
      - ../robin-dovecot/dovecot/etc:/etc/dovecot:ro
      - dovecot-data:/var/mail/vhosts
    tmpfs:
      - /var/log/dovecot:size=64m
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2525:25"
      - "2143:143"
      - "2993:993"
      - "2110:110"
      - "24190:4190"
    networks:
      robin-dovecot-lda-net:
        aliases:
          - lmtp-backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 && doveadm who >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    command:
      - "postgres"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    environment:
      POSTGRES_DB: robin
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: robin
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../.shared/db-init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /var/log:size=32m
    ports:
      - "5432:5432"
    networks:
      robin-dovecot-lda-net:
        aliases:
          - postgres-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  robin-dovecot-lda-net:
    driver: bridge

volumes:
  postgres-data:
  dovecot-data:

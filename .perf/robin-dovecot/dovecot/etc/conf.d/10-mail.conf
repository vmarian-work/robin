# Mail storage configuration for performance testing

# Mail driver (Dovecot 2.4 syntax)
mail_driver = mdbox

# Keep only volatile lock/temp files on tmpfs. Dovecot documents this as a safe optimization.
mail_volatile_path = /dev/shm/dovecot-volatile/%2.256Nu/%u

# Enable mailbox list indexes explicitly for predictable perf behaviour.
mailbox_list_index = yes
mailbox_list_index_very_dirty_syncs = yes

# First valid UID for mail users
first_valid_uid = 90
last_valid_uid = 0

# LMTP protocol configuration for performance testing

protocol lmtp {
  # Control concurrent deliveries to a single user
  # Sustained perf benchmark value: keep same-user fan-out bounded so the multi-recipient workload
  # reflects backend throughput rather than one mailbox being hammered by oversized concurrency.
  lmtp_user_concurrency_limit = 24

  # Postmaster address for LMTP
  postmaster_address = postmaster@example.com
}

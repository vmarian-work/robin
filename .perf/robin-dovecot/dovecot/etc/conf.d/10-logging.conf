# Logging configuration for performance testing.
# Keep logging light so filesystem churn does not distort LMTP benchmarks.

# Log to file for proper debugging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot.log
debug_log_path = /var/log/dovecot.log

# Disable verbose debug logging in perf runs.
auth_verbose = no
auth_debug = no
mail_debug = no

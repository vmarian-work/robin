# Docker Compose for Postfix Performance Testing
# This stack includes: Postfix + Dovecot + PostgreSQL

services:
  dovecot-mail-init:
    image: alpine:3.20
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /var/mail/vhosts/example.com
        chown -R 5000:5000 /var/mail/vhosts
        chmod 2775 /var/mail/vhosts /var/mail/vhosts/example.com
    volumes:
      - dovecot-data:/var/mail/vhosts
    restart: "no"

  postgres:
    image: postgres:latest
    command:
      - "postgres"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    environment:
      POSTGRES_DB: robin
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: robin
      POSTGRES_MAX_CONNECTIONS: 300
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ../.shared/db-init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql
    tmpfs:
      - /var/log:size=32m
    networks:
      postfix-net:
        aliases:
          - postgres-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin -d robin"]
      interval: 5s
      timeout: 3s
      retries: 10

  dovecot:
    image: dovecot/dovecot:latest
    user: "0:0"
    cap_add:
      - CHOWN
    volumes:
      - ./dovecot/etc:/etc/dovecot
      - dovecot-data:/var/mail/vhosts
      - dovecot-sockets:/var/run/dovecot
      - postfix-spool:/var/spool/postfix
    tmpfs:
      - /var/log:size=64m
    networks:
      postfix-net:
        aliases:
          - lmtp-backend
    depends_on:
      dovecot-mail-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "doveadm", "who"]
      interval: 10s
      timeout: 5s
      retries: 5

  postfix:
    build:
      context: ../../
      dockerfile: .perf/.shared/postfix/Dockerfile
    volumes:
      - ../.shared/postfix/etc/postfix/main.cf:/etc/postfix/main.cf:ro
      - ../.shared/postfix/etc/postfix/master.cf:/etc/postfix/master.cf:ro
      - ../.shared/postfix/etc/postfix/pgsql-virtual-mailbox-domains.cf:/etc/postfix/pgsql-virtual-mailbox-domains.cf:ro
      - ../.shared/postfix/etc/postfix/pgsql-virtual-mailbox-maps.cf:/etc/postfix/pgsql-virtual-mailbox-maps.cf:ro
      - dovecot-data:/var/mail/vhosts
      - dovecot-sockets:/var/run/dovecot
      - postfix-spool:/var/spool/postfix
    tmpfs:
      - /var/log/postfix:size=32m
    networks:
      - postfix-net
    depends_on:
      dovecot:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "2525:25"     # SMTP (aligned; stacks not run simultaneously)
    healthcheck:
      test: ["CMD-SHELL", "postfix status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  postfix-net:
    driver: bridge

volumes:
  postgres-data:
  dovecot-data:
  dovecot-sockets:  # Shared volume for UNIX socket communication
  postfix-spool:    # Shared Postfix spool directory

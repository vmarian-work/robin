# Docker Compose for Robin MTA Performance Testing
# This stack includes: Robin MTA + Dovecot + PostgreSQL (no virus/spam scanning)

services:
  dovecot-mail-init:
    image: alpine:3.20
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /var/mail/vhosts/example.com
        chown -R 5000:5000 /var/mail/vhosts
        chmod 2775 /var/mail/vhosts /var/mail/vhosts/example.com
    volumes:
      - dovecot-data:/var/mail/vhosts
    restart: "no"

  postgres:
    image: postgres:latest
    command:
      - "postgres"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    environment:
      POSTGRES_DB: robin
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: robin
      POSTGRES_MAX_CONNECTIONS: 300
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ../.shared/db-init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql
    tmpfs:
      - /var/log:size=32m
    networks:
      robin-net:
        aliases:
          - postgres-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin -d robin"]
      interval: 5s
      timeout: 3s
      retries: 10

  dovecot:
    image: dovecot/dovecot:latest
    user: "0:0"
    cap_add:
      - CHOWN
    volumes:
      - ./dovecot/etc:/etc/dovecot
      - dovecot-data:/var/mail/vhosts
    tmpfs:
      - /var/log:size=64m
    networks:
      robin-net:
        aliases:
          - lmtp-backend
    depends_on:
      dovecot-mail-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "doveadm", "who"]
      interval: 10s
      timeout: 5s
      retries: 5

  robin:
    image: robin-robin-mta:latest
    environment:
      JAVA_TOOL_OPTIONS: "-Dnetworkaddress.cache.negative.ttl=300 -Dsun.net.inetaddr.negative.ttl=300 -Dlog4j2.asyncLoggerWaitStrategy=Timeout -Dlog4j2.asyncLoggerTimeout=1000 ${JAVA_TOOL_OPTIONS:-}"   # Optional JFR/profiling flags (off by default)
    volumes:
      - ./inline-cfg:/usr/local/robin/cfg
      - robin-store:/usr/local/robin/store
    tmpfs:
      - /var/log:size=32m
      - /usr/local/robin/store/robin/tmp:size=256m
    networks:
      - robin-net
    depends_on:
      dovecot:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "2525:25"      # SMTP
      - "28080:8080"   # Health endpoint
      - "28090:8090"   # Service endpoint
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  robin-net:
    driver: bridge

volumes:
  postgres-data:
  dovecot-data:
  robin-store:
